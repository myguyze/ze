routing:
  threshold: 0.55
  gap_threshold: 0.10
  embedding_model: all-MiniLM-L6-v2
  fallback_model: anthropic/claude-haiku-4-5

models:
  router:         anthropic/claude-haiku-4-5   # routing fallback + fact dedup merges
  synthesis:      anthropic/claude-haiku-4-5   # multi-agent response synthesis + episode summaries
  profile:        anthropic/claude-haiku-4-5   # user profile synthesis
  reminders:      anthropic/claude-haiku-4-5   # calendar reminder interval assessment
  insights:       anthropic/claude-haiku-4-5   # weekly insight generation
  whisper:        openai/gpt-audio             # voice transcription
  vision_caption: google/gemini-flash-1.5      # cheap routing caption for images


persona:
  # Active profile name. Overridden at runtime by the DB (via /persona command).
  profile: default

  # BCP 47 locale for progress message translations (en | pt)
  locale: en

  profiles:
    default:
      traits:
        - direct
        - warm
        - concise
      # concise | balanced | detailed
      verbosity: concise
      # Free-form addition appended after traits, before memory context.
      custom_instructions: ""
      dials:
        humor:       0.3   # 0 = none → 1 = freely witty
        directness:  0.9   # 0 = Socratic → 1 = blunt conclusions-first
        formality:   0.2   # 0 = casual → 1 = formal
        depth:       0.5   # 0 = surface → 1 = full elaboration

    stoic:
      traits:
        - precise
        - measured
      verbosity: concise
      custom_instructions: ""
      dials:
        humor:       0.05
        directness:  1.0
        formality:   0.7
        depth:       0.4

    playful:
      traits:
        - warm
        - curious
        - witty
      verbosity: balanced
      custom_instructions: ""
      dials:
        humor:       0.85
        directness:  0.4
        formality:   0.1
        depth:       0.6

contacts:
  consolidation:
    episode_batch_size: 10       # episodes per LLM extraction call
    max_episodes_per_run: 50     # cap on episodes processed per nightly run
    nightly_cron: "0 3 * * *"   # 3 AM UTC — after memory consolidation at 2 AM
    review_cron: "30 8 * * *"   # 8:30 AM UTC — surface pending contacts for confirmation
  follow_up:
    stale_days: 7                # nudge if a contact hasn't been mentioned in N days
    max_nudges: 3                # max nudges to show in the morning briefing

memory:
  contradiction_threshold: 0.85

  consolidation:
    merge_silent_threshold: 0.95   # > this → silent merge, no LLM
    merge_llm_threshold: 0.85      # > this (and < silent) → LLM merge
    contradicted_ttl_days: 30      # hard-delete contradicted facts after N days
    unreviewed_ttl_days: 90        # soft-expire unreviewed facts after N days
    expiry_grace_days: 7           # days between soft-expire and hard-delete
    episode_recency_days: 14       # never archive episodes newer than N days
    episode_archive_batch: 20      # episodes per archive batch
    episode_min_archive_batch: 10  # minimum unarchived episodes to trigger a run
    nightly_cron: "0 2 * * *"      # 2 AM UTC daily

  profile:
    min_facts: 3      # skip synthesis below this many reviewed facts
    episode_limit: 50 # max episodes fed into synthesis prompt

  insights:
    lookback_days: 7  # evidence window
    min_evidence: 3   # min facts + episodes to proceed
    max_per_run: 3    # cap on insights pushed per weekly run

proactive:
  briefing:
    enabled: true
    cron: "0 8 * * *"               # 8 AM UTC daily
    unreviewed_nudge_threshold: 5   # include nudge if unreviewed facts >= this

  alerts:
    workflow_failure_enabled: true
    workflow_failure_cooldown_hours: 1  # min hours between repeated alerts per workflow

  calendar:
    sync_enabled: true
    sync_cron: "45 7 * * *"   # 7:45 AM UTC — before briefing
    sync_days_ahead: 7

  insights:
    enabled: true
    cron: "0 7 * * 0"           # Sunday 7 AM UTC — before the 8 AM briefing
    category_cooldown_days: 7   # suppress same category within this window

agents:
  research:
    enabled: true
    vision_capable: true
    description: |
      Handles web searches, fact-finding, summarisation, and research synthesis.
      Use when the user explicitly says "research", "look up", "find out", "search for",
      or asks about current events, factual lookups, topic deep-dives, company or
      organisation history, news, or anything requiring information retrieval from the web.
      Also use for factual comparisons ("what are the differences between X and Y"),
      technical how-things-work questions, and any query where accurate sourced information
      matters more than reasoning or conversation.
    model: anthropic/claude-sonnet-4-5
    model_simple: anthropic/claude-haiku-4-5
    tools:
      - web_search
      - summarize
      - extract_facts
    timeout_seconds: 30
    intent_map:
      read: web_search
    capabilities:
      read: autonomous
      execute: confirm
      create: autonomous
      update: autonomous
      delete: autonomous
      reason: autonomous

  companion:
    enabled: true
    vision_capable: true
    description: |
      Handles reasoning, thinking, brainstorming, analysis, and open-ended conversation.
      Use for thinking through problems, getting a second opinion, exploring ideas,
      writing assistance, or any task that does not require external tools or live data.
      Do NOT use for queries that involve researching, searching, or looking things up.
    model: anthropic/claude-sonnet-4-5
    model_simple: anthropic/claude-haiku-4-5
    tools: []
    timeout_seconds: 60
    intent_map:
      reason: direct_completion
    capabilities:
      reason: autonomous
      read: autonomous
      create: autonomous
      update: autonomous
      delete: autonomous
      execute: autonomous

  calendar:
    enabled: true
    vision_capable: true
    description: |
      Manages Google Calendar events. Use for creating, reading, updating, or deleting
      calendar events, checking availability, finding free time, or setting reminders.
    model: anthropic/claude-haiku-4-5
    tools:
      - list_events
      - create_event
      - update_event
      - delete_event
      - extract_facts
    timeout_seconds: 30
    intent_map:
      read: "Search and retrieve calendar events."
      create: "Create a new calendar event."
      update: "Update an existing calendar event."
      delete: "Delete a calendar event."
    capabilities:
      read: autonomous
      create: confirm
      update: confirm
      delete: confirm

  email:
    enabled: true
    vision_capable: true
    description: |
      Manages Gmail messages. Use for reading, drafting, sending, or archiving emails,
      searching your inbox, or composing replies.
    model: anthropic/claude-haiku-4-5
    tools:
      - list_emails
      - get_email
      - draft_email
      - send_email
      - archive_email
      - extract_facts
    timeout_seconds: 30
    intent_map:
      read: "Search and retrieve emails from Gmail."
      create: "Draft or send an email."
      update: "Draft a reply or forward."
      delete: "Archive or delete an email."
    capabilities:
      read: autonomous
      create: draft_only
      update: draft_only
      delete: confirm

  workflow:
    enabled: true
    vision_capable: true
    description: |
      Manages stored workflows and recurring scheduled tasks. Use when the user wants
      to create, list, enable, disable, delete, or manually run a named workflow or
      recurring automated task.
    model: anthropic/claude-sonnet-4-5
    tools: []
    timeout_seconds: 60
    intent_map:
      read: ""
      manage: ""
    capabilities:
      read: autonomous
      manage: confirm

  reminders:
    enabled: true
    vision_capable: false
    description: |
      Sets, lists, and cancels one-off time-based reminders. Use when the user asks
      to be reminded about something at a specific future time or after a delay,
      or wants to see, check, or cancel their reminders
      (e.g. "remind me in 2 hours", "remind me tomorrow at 9am to call João",
      "what reminders do I have", "show my reminders", "cancel my reminder").
      Also use when the user says "remind me" but specifies an invalid or past time
      (e.g. "remind me yesterday", "remind me last Tuesday") — the reminders agent
      validates the time and rejects it gracefully rather than silently routing elsewhere.
      Do NOT use for recurring tasks — use the workflow agent for those.
    model: anthropic/claude-haiku-4-5
    tools: []
    timeout_seconds: 15
    intent_map:
      manage: ""
    capabilities:
      manage: autonomous
      create: autonomous
      read: autonomous
      update: autonomous
      delete: autonomous
      execute: autonomous
      reason: autonomous

  prospecting:
    enabled: true
    model: anthropic/claude-sonnet-4-5
    timeout_seconds: 180
    description: >
      Find people matching a target profile, enrich their contact details, and
      generate outreach materials. Use when the user wants to build a prospect
      list, find contacts in an industry or geography, or prepare outreach for
      a campaign.
    intent_map:
      read: autonomous
      write: autonomous
    capabilities:
      read: autonomous
      write: autonomous

  goals:
    enabled: true
    description: |
      Creates and manages long-running goals that Ze executes autonomously over days or weeks.
      Use when the user describes a multi-step objective with a time horizon — something that
      cannot be done in a single run, like "run a prospecting campaign", "research and prepare
      for a conference", or "build a target list and send outreach over the next month".
      Also use for inspecting, pausing, resuming, or abandoning active goals.
      Do NOT use for one-shot tasks — use the workflow agent for those.
    model: anthropic/claude-sonnet-4-5
    model_simple: anthropic/claude-haiku-4-5
    tools: []
    timeout_seconds: 60
    intent_map:
      create: "Create a new multi-week goal and decompose it into milestones."
      read: "Inspect goal status, list active goals, or review learnings."
      update: "Pause, resume, or redirect an active goal."
      delete: "Abandon a goal."
    capabilities:
      create: confirm
      read: autonomous
      update: confirm
      delete: confirm

browser:
  service_url: "http://ze-browser.internal:8080"
  timeout_seconds: 20
  max_text_chars: 8000
  delay_ms: 2000

prospecting:
  max_iterations: 15
  max_loop_tokens: 24000
  stale_campaign_timeout_minutes: 60
