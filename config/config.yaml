routing:
  threshold: 0.55
  gap_threshold: 0.10
  embedding_model: all-MiniLM-L6-v2
  fallback_model: anthropic/claude-haiku-4-5

models:
  router:    anthropic/claude-haiku-4-5   # routing fallback + fact dedup merges
  synthesis: anthropic/claude-haiku-4-5   # multi-agent response synthesis + episode summaries
  profile:   anthropic/claude-haiku-4-5   # user profile synthesis
  reminders: anthropic/claude-haiku-4-5   # calendar reminder interval assessment
  insights:  anthropic/claude-haiku-4-5   # weekly insight generation


persona:
  traits:
    - direct
    - warm
    - concise
  # concise | balanced | detailed
  verbosity: concise
  # Free-form addition appended after traits, before memory context.
  # Example: "Always respond in European Portuguese." / "Use my name João."
  custom_instructions: ""

memory:
  contradiction_threshold: 0.85

  consolidation:
    merge_silent_threshold: 0.95   # > this → silent merge, no LLM
    merge_llm_threshold: 0.85      # > this (and < silent) → LLM merge
    contradicted_ttl_days: 30      # hard-delete contradicted facts after N days
    unreviewed_ttl_days: 90        # soft-expire unreviewed facts after N days
    expiry_grace_days: 7           # days between soft-expire and hard-delete
    episode_recency_days: 14       # never archive episodes newer than N days
    episode_archive_batch: 20      # episodes per archive batch
    episode_min_archive_batch: 10  # minimum unarchived episodes to trigger a run
    nightly_cron: "0 2 * * *"      # 2 AM UTC daily

  profile:
    min_facts: 3      # skip synthesis below this many reviewed facts
    episode_limit: 50 # max episodes fed into synthesis prompt

  insights:
    lookback_days: 7  # evidence window
    min_evidence: 3   # min facts + episodes to proceed
    max_per_run: 3    # cap on insights pushed per weekly run

proactive:
  briefing:
    enabled: true
    cron: "0 8 * * *"               # 8 AM UTC daily
    unreviewed_nudge_threshold: 5   # include nudge if unreviewed facts >= this

  alerts:
    workflow_failure_enabled: true
    workflow_failure_cooldown_hours: 1  # min hours between repeated alerts per workflow

  calendar:
    sync_enabled: true
    sync_cron: "45 7 * * *"   # 7:45 AM UTC — before briefing
    sync_days_ahead: 7

  insights:
    enabled: true
    cron: "0 7 * * 0"           # Sunday 7 AM UTC — before the 8 AM briefing
    category_cooldown_days: 7   # suppress same category within this window

agents:
  research:
    enabled: true
    description: |
      Handles web searches, fact-finding, summarisation, and research synthesis.
      Use for questions about current events, factual lookups, topic deep-dives,
      or anything requiring information retrieval from the web.
    model: anthropic/claude-sonnet-4-5
    model_simple: anthropic/claude-haiku-4-5
    tools:
      - web_search
      - summarize
      - extract_facts
    timeout_seconds: 30
    intent_map:
      read: web_search
    capabilities:
      read: autonomous
      execute: confirm

  companion:
    enabled: true
    description: |
      Handles reasoning, thinking, brainstorming, analysis, and open-ended conversation.
      Use for thinking through problems, getting a second opinion, exploring ideas,
      writing assistance, or any task that does not require external tools or live data.
    model: anthropic/claude-sonnet-4-5
    model_simple: anthropic/claude-haiku-4-5
    tools: []
    timeout_seconds: 60
    intent_map:
      reason: direct_completion
    capabilities:
      reason: autonomous

  calendar:
    enabled: false
    description: |
      Manages Google Calendar events. Use for creating, reading, updating, or deleting
      calendar events, checking availability, finding free time, or setting reminders.
    model: anthropic/claude-haiku-4-5
    tools:
      - list_events
      - create_event
      - update_event
      - delete_event
      - extract_facts
    timeout_seconds: 30
    intent_map:
      read: "Search and retrieve calendar events."
      create: "Create a new calendar event."
      update: "Update an existing calendar event."
      delete: "Delete a calendar event."
    capabilities:
      read: autonomous
      create: confirm
      update: confirm
      delete: confirm

  email:
    enabled: false
    description: |
      Manages Gmail messages. Use for reading, drafting, sending, or archiving emails,
      searching your inbox, or composing replies.
    model: anthropic/claude-haiku-4-5
    tools:
      - list_emails
      - get_email
      - draft_email
      - send_email
      - archive_email
      - extract_facts
    timeout_seconds: 30
    intent_map:
      read: "Search and retrieve emails from Gmail."
      create: "Draft or send an email."
      update: "Draft a reply or forward."
      delete: "Archive or delete an email."
    capabilities:
      read: autonomous
      create: draft_only
      update: draft_only
      delete: confirm

  workflow:
    enabled: true
    description: |
      Manages stored workflows and recurring scheduled tasks. Use when the user wants
      to create, list, enable, disable, delete, or manually run a named workflow or
      recurring automated task.
    model: anthropic/claude-sonnet-4-5
    tools: []
    timeout_seconds: 60
    intent_map:
      read: ""
      manage: ""
    capabilities:
      read: autonomous
      manage: confirm
