- id: calendar_read_today
  prompt: "What's on my calendar today?"
  description: Read today's events — should attempt calendar lookup
  expected_agent: calendar
  expected_tools: [list_events]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should attempt to fetch today's events via the calendar tool
    - If no events, should say so clearly rather than guessing
    - If credentials missing, should explain gracefully

- id: calendar_read_week
  prompt: "What does my week look like?"
  description: Read events for the current week — requires date-aware query
  expected_agent: calendar
  expected_tools: [list_events]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should fetch events across the full week, not just today
    - Response should be organised by day if multiple events exist

- id: calendar_create_simple
  prompt: "Add a team standup every day at 9am starting Monday."
  description: Create a recurring calendar event — requires writing to calendar
  expected_agent: calendar
  expected_tools: [create_event]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should attempt to create a recurring event
    - Should confirm the event details (time, label, recurrence) before or after creation
    - Should not silently fail if Google Calendar is unavailable

- id: calendar_create_with_attendees
  prompt: "Schedule a 1:1 with Ana tomorrow at 3pm and invite ana@example.com."
  description: Create event with an attendee — tests contact and invite handling
  expected_agent: calendar
  expected_tools: [create_event]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should include ana@example.com as an attendee
    - Should confirm the scheduled time
    - Should not invent meeting details not provided by the user

- id: calendar_find_free_slot
  prompt: "When am I free tomorrow afternoon for a 30-minute call?"
  description: Free-slot query — requires reading calendar and reasoning about gaps
  expected_agent: calendar
  expected_tools: [list_events]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should fetch tomorrow's events and identify free windows
    - Should return specific time slots, not a vague "check your calendar"
    - Should acknowledge if calendar access fails

- id: calendar_delete_event
  prompt: "Cancel my dentist appointment on Thursday."
  description: Delete a calendar event by label hint
  expected_agent: calendar
  expected_tools: [list_events, delete_event]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should search for an event matching "dentist" on Thursday
    - If found, should confirm cancellation
    - If not found, should say so rather than claiming success

- id: calendar_natural_language_date
  prompt: "What do I have next Friday?"
  description: Relative date reference — Ze must resolve "next Friday" correctly
  expected_agent: calendar
  expected_tools: [list_events]
  tags: [routing, calendar]
  criteria:
    - Should route to the calendar agent
    - Should correctly resolve "next Friday" relative to today
    - Should not confuse "next Friday" with "this Friday"

- id: calendar_credentials_missing
  prompt: "Show me my calendar."
  description: Calendar query without Google credentials — graceful error handling
  expected_agent: calendar
  tags: [routing, calendar, graceful_degradation]
  criteria:
    - Should route to the calendar agent
    - If credentials are missing or expired, should explain what's needed
    - Should not crash or return a raw error traceback
    - Should suggest how to reconnect (e.g. /auth command or OAuth flow)

- id: calendar_multi_turn_create_confirm
  description: "Multi-turn: create an event with partial info, Ze asks for missing detail"
  expected_tools: [create_event]
  turns:
    - prompt: "Add a meeting with the design team."
      description: "Turn 1: vague event creation — no time specified"
    - prompt: "Tomorrow at 2pm for one hour."
      description: "Turn 2: provide the missing time detail"
  expected_agent: calendar
  tags: [routing, calendar, multi_turn]
  criteria:
    - Turn 1 should ask for a time since none was given
    - Turn 2 should use the provided time and confirm the event
    - Ze should not forget the "design team" label from turn 1
