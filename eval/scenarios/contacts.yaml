- id: contacts_lookup_by_name
  prompt: "What's Ana's email address?"
  description: Contact lookup by first name — tests PersonStore retrieval
  expected_agent: companion
  tags: [routing, contacts]
  criteria:
    - Should attempt to look up Ana in the contacts store
    - If found, should return her email address
    - If not found, should say so rather than fabricating an address
    - Should not confuse different people named Ana

- id: contacts_list_known
  prompt: "Who are my contacts?"
  description: List known contacts — tests full contact retrieval
  expected_agent: companion
  tags: [routing, contacts]
  criteria:
    - Should attempt to retrieve the contacts list
    - If contacts exist, should list names and optionally a key detail (email, role)
    - If no contacts stored, should say so and explain how Ze learns about contacts
    - Should not fabricate people

- id: contacts_add_explicitly
  prompt: "Remember that my colleague Pedro works at Acme Corp and his email is pedro@acme.io."
  description: Explicit contact addition via conversation — tests fact extraction and storage
  expected_agent: companion
  verify:
    - table: contacts
      where: {name__icontains: pedro}
      expect: exists
  tags: [routing, contacts, memory]
  criteria:
    - Should acknowledge the contact details
    - Should store Pedro's name, employer, and email
    - Should confirm what was saved, not just say "got it"
    - Should not ask unnecessary clarifying questions

- id: contacts_update_detail
  prompt: "Ana moved to a new company. She's now at beta@newco.com."
  description: Update an existing contact's detail — tests contradiction handling
  expected_agent: companion
  tags: [routing, contacts, memory]
  criteria:
    - Should find Ana in contacts
    - Should update the email address, not add a duplicate
    - Should confirm the update
    - Should not claim the old email is still valid

- id: contacts_find_by_company
  prompt: "Do I know anyone at Acme Corp?"
  description: Contact search by organisation — tests filtered lookup
  expected_agent: companion
  tags: [routing, contacts]
  criteria:
    - Should search contacts by company name "Acme Corp"
    - Should return matching contacts with their names and roles
    - If no matches, should say so clearly
    - Should not fabricate contacts at that company

- id: contacts_multi_turn_add_and_recall
  description: "Multi-turn: add a contact, then ask about them"
  verify:
    - table: contacts
      where: {name__icontains: maria}
      expect: exists
  turns:
    - prompt: "My lawyer is Maria Santos, she's at marias@lawfirm.pt."
      description: "Turn 1: add a new contact"
    - prompt: "What's my lawyer's email?"
      description: "Turn 2: recall the contact"
  expected_agent: companion
  tags: [routing, contacts, memory, multi_turn]
  criteria:
    - Turn 1 should acknowledge and store Maria Santos with the given email
    - Turn 2 should correctly recall marias@lawfirm.pt without asking for clarification
    - Turn 2 should not fabricate a different email
