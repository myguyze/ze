- id: workflow_create_simple
  prompt: "Create a workflow: every Monday morning, summarise my unread emails and send me a digest."
  description: Create a recurring workflow — tests workflow planning and scheduling
  expected_agent: workflow
  expected_tools:
    - name: create_workflow
      args:
        description__icontains: email
  verify:
    - table: workflows
      where: {description__icontains: email}
      expect: exists
  tags: [routing, workflow]
  criteria:
    - Should route to the workflow agent
    - Should recognise this as a multi-step workflow (fetch emails → summarise → notify)
    - Should confirm the workflow plan before executing
    - Should acknowledge the Monday morning schedule

- id: workflow_list_active
  prompt: "What workflows do I have running?"
  description: List active workflows — tests workflow retrieval
  expected_agent: workflow
  expected_tools: [list_workflows]
  tags: [routing, workflow]
  criteria:
    - Should route to the workflow agent
    - If workflows exist, should list them with their schedules and last-run status
    - If none, should say so clearly
    - Should not confuse workflows with reminders

- id: workflow_pause
  prompt: "Pause my email digest workflow."
  description: Pause a running workflow — tests state management
  expected_agent: workflow
  expected_tools: [disable_workflow]
  tags: [routing, workflow]
  criteria:
    - Should route to the workflow agent
    - Should find the email digest workflow and pause it
    - Should confirm it has been paused, not just acknowledge the request
    - If not found, should list active workflows and ask which to pause

- id: workflow_run_now
  prompt: "Run my weekly report workflow right now."
  description: Trigger a workflow on demand — tests manual execution
  expected_agent: workflow
  expected_tools: [trigger_workflow]
  tags: [routing, workflow]
  criteria:
    - Should route to the workflow agent
    - Should trigger the specified workflow immediately
    - Should report what steps were executed and their outcomes
    - Should handle failure of a step gracefully (not silently)

- id: workflow_multi_step_approval
  description: "Multi-turn: Ze proposes a workflow plan, user approves before execution"
  expected_tools:
    - name: create_workflow
      args:
        description__icontains: calendar
  verify:
    - table: workflows
      where: {description__icontains: calendar}
      expect: exists
  turns:
    - prompt: "Set up a workflow that checks my calendar each morning and sends me a briefing."
      description: "Turn 1: workflow creation request"
    - prompt: "Yes, looks good. Go ahead."
      description: "Turn 2: user approves the proposed plan"
  expected_agent: workflow
  tags: [routing, workflow, multi_turn]
  criteria:
    - Turn 1 should propose a workflow plan for review, not execute immediately
    - Plan should show the steps (fetch calendar → format briefing → send via Telegram)
    - Turn 2 should confirm activation after approval
    - Ze should not execute before the user says yes

- id: workflow_error_handling
  prompt: "Why did my email digest workflow fail yesterday?"
  description: Workflow failure inquiry — tests execution log retrieval
  expected_agent: workflow
  tags: [routing, workflow]
  criteria:
    - Should route to the workflow agent
    - Should attempt to fetch the last execution log for the email digest workflow
    - Should explain what failed (step name, error reason) if available
    - Should not fabricate an error reason if no log is found
