[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ze-notifications"
version = "0.1.0"
description = "Ze notifications package — Notifier protocol and NtfyNotifier implementation"
requires-python = ">=3.11"
dependencies = [
    "aiohttp>=3.9",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "ruff>=0.8",
    "aioresponses>=0.7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["ze_notifications"]
