[project]
name = "ze-prospecting"
version = "0.1.0"
description = "Prospecting agent, campaign store, and recovery jobs for Ze."
requires-python = ">=3.12"
dependencies = [
    "ze-core",
    "ze-browser",
    "ze-personal",
    "asyncpg>=0.30",
]

[tool.uv.sources]
ze-core     = { workspace = true }
ze-browser  = { workspace = true }
ze-personal = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ze_prospecting"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
