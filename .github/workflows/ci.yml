name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd apps/ze-web && bun install --frozen-lockfile

      - name: Build
        run: make web-build

      - name: Test
        run: cd apps/ze-web && bun run test

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: make lint

      - name: Pytest
        run: |
          uv run pytest apps/ze-api/tests -m 'not slow' -q
          uv run pytest core/ze-core/tests -m 'not slow' -q
          uv run pytest plugins/ze-personal/tests -m 'not slow' -q
          uv run pytest core/ze-communication/tests -m 'not slow' -q
          uv run pytest integrations/ze-google/tests -m 'not slow' -q
          uv run pytest plugins/ze-messenger/tests -m 'not slow' -q
          uv run pytest plugins/ze-calendar/tests -m 'not slow' -q
          uv run pytest plugins/ze-news/tests -m 'not slow' -q

