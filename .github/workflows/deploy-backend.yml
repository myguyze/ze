name: Deploy backend

# Manual Fly.io deploy only (Actions → Deploy backend → Run workflow).
# Or deploy locally: fly deploy --config apps/ze-api/fly.toml --dockerfile apps/ze-api/Dockerfile
# Required repository secret: FLY_API_TOKEN
#   fly tokens create deploy -x 999999h

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: >-
          flyctl deploy . --remote-only
          --config apps/ze-api/fly.toml
          --dockerfile apps/ze-api/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
