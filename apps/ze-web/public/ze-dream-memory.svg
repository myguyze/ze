<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ze Dream Memory Cycle</title>
  <desc id="desc">A simple memory pipeline for Ze showing wake capture, sleep replay, dreaming, and validation.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111d"/>
      <stop offset="1" stop-color="#101b2b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#132235"/>
      <stop offset="1" stop-color="#0e1827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      .t { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e7eef8; }
      .muted { fill: #b9c8db; }
      .small { font-size: 18px; }
      .body { font-size: 20px; }
      .title { font-size: 42px; font-weight: 800; }
      .section { font-size: 24px; font-weight: 700; }
      .label { font-size: 16px; letter-spacing: 1.6px; text-transform: uppercase; fill: #8fb3d9; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L12 6 L0 12 Z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="140" fill="#2563eb" fill-opacity="0.10"/>
  <circle cx="1220" cy="700" r="180" fill="#8b5cf6" fill-opacity="0.08"/>

  <text x="80" y="78" class="t label">Ze memory architecture</text>
  <text x="80" y="128" class="t title">Dreaming as offline consolidation</text>
  <text x="80" y="164" class="t body muted">Ze captures useful experiences, replays them overnight, generates dream variants, then keeps only the changes that help.</text>

  <rect x="70" y="220" width="1260" height="360" rx="28" fill="url(#card)" stroke="#24374d" stroke-width="1.5"/>

  <!-- Cards -->
  <g>
    <rect x="110" y="290" width="220" height="220" rx="22" fill="#101d2e" stroke="#2d425d"/>
    <text x="140" y="332" class="t label">Wake</text>
    <text x="140" y="374" class="t section">Capture</text>
    <text x="140" y="414" class="t body muted">User interactions</text>
    <text x="140" y="446" class="t body muted">Tool outcomes</text>
    <text x="140" y="478" class="t body muted">Salient events</text>
  </g>

  <g>
    <rect x="400" y="290" width="220" height="220" rx="22" fill="#101d2e" stroke="#2d425d"/>
    <text x="430" y="332" class="t label">Sleep</text>
    <text x="430" y="374" class="t section">Replay</text>
    <text x="430" y="414" class="t body muted">Rehearse memory</text>
    <text x="430" y="446" class="t body muted">Compress detail</text>
    <text x="430" y="478" class="t body muted">Form abstractions</text>
  </g>

  <g>
    <rect x="690" y="290" width="220" height="220" rx="22" fill="#101d2e" stroke="#2d425d"/>
    <text x="720" y="332" class="t label">Dream</text>
    <text x="720" y="374" class="t section">Imagine</text>
    <text x="720" y="414" class="t body muted">Perturb memories</text>
    <text x="720" y="446" class="t body muted">Generate counterfactuals</text>
    <text x="720" y="478" class="t body muted">Stress-test plans</text>
  </g>

  <g>
    <rect x="980" y="290" width="220" height="220" rx="22" fill="#101d2e" stroke="#2d425d"/>
    <text x="1010" y="332" class="t label">Critic</text>
    <text x="1010" y="374" class="t section">Select</text>
    <text x="1010" y="414" class="t body muted">Check consistency</text>
    <text x="1010" y="446" class="t body muted">Measure usefulness</text>
    <text x="1010" y="478" class="t body muted">Keep validated changes</text>
  </g>

  <!-- Arrows -->
  <path d="M330 400 H400" stroke="url(#line)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M620 400 H690" stroke="url(#line)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M910 400 H980" stroke="url(#line)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Bottom explanation -->
  <rect x="70" y="620" width="1260" height="150" rx="24" fill="#0f1a29" stroke="#24374d" stroke-width="1.5"/>
  <text x="110" y="668" class="t section">How it works</text>
  <text x="110" y="706" class="t body muted">1. Ze stores important episodes while awake.</text>
  <text x="110" y="738" class="t body muted">2. During sleep, it replays and compresses them.</text>
  <text x="110" y="770" class="t body muted">3. Dreaming creates variations, and a critic keeps only what improves future behavior.</text>
</svg>
