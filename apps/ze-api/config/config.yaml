# Ze structural config — secrets and deployment values live in .env

models:
  router:         anthropic/claude-haiku-4-5
  synthesis:      anthropic/claude-haiku-4-5
  profile:        anthropic/claude-haiku-4-5
  reminders:      anthropic/claude-haiku-4-5
  insights:       anthropic/claude-haiku-4-5
  whisper:          openai/gpt-audio
  vision_caption:   google/gemini-flash-1.5
  workflow_verify:  anthropic/claude-3.5-haiku

memory:
  nli_contradiction_threshold: 0.60
  nli_entailment_threshold: 0.70
  nli_lower_cosine_bound: 0.60
  nli_write_time_check: true
  nli_grounding_threshold: 0.30
  nli_retrieval_rerank: true
  nli_rerank_candidate_multiplier: 2
  nli_rerank_min_candidates: 5
  consolidation:
    episode_archive_days: 7
    episode_archive_batch: 50
    session_grouping_enabled: true
    min_session_episodes: 3
    max_sessions_per_run: 10
  graph:
    enabled: true
    max_hops: 1
    max_relationships: 20
  signals:
    enabled: true
    retention_days: 90
    force_ingest_sources: []   # e.g. ["news"] to bypass admission gate in dev

contacts:
  consolidation:
    episode_batch_size: 10
    max_episodes_per_run: 50
    nightly_cron: "0 3 * * *"
    review_cron: "30 8 * * *"
  follow_up:
    stale_days: 7
    max_nudges: 3

onboarding:
  enabled: true
  auto_start_on_empty_profile: true
  require_review: true
  reset:
    allow_full_dev_from_app: false

proactive:
  briefing:
    enabled: true
    cron: "0 8 * * *"
    unreviewed_nudge_threshold: 5
  alerts:
    workflow_failure_enabled: true
    workflow_failure_cooldown_hours: 1
  calendar:
    sync_enabled: true
    sync_cron: "45 7 * * *"
    sync_days_ahead: 7
  insights:
    enabled: true
    cron: "0 7 * * 0"
    lookback_days: 7
    min_evidence: 3
    max_per_run: 3
    category_cooldown_days: 7
  goal_narrative:
    enabled: true
    cron: "0 18 * * 0"
  goal_suggestion:
    enabled: true
    cron: "0 19 * * 0"
  stuck_goals:
    enabled: true
    cron: "0 9 * * 2"
  accountability:
    enabled: true
    schedule: "0 9 * * 1"          # Monday 09:00 weekly narrative
    cost_anomaly_schedule: "0 */6 * * *"  # every 6 hours
    anomaly_threshold: 4.0          # multiplier above baseline to alert
    anomaly_min_samples: 5          # min historical runs to establish baseline
    anomaly_retention_days: 30      # how long to keep anomaly records
    stall_days: 3                   # milestone idle days before counted as stalled

correlation:
  inline:
    enabled: true
    timeout_ms: 1500
    max_connections_shown: 2
    agents: ["research", "news"]
  engine:
    enabled: true
    max_hops_inline: 1
    max_hops_proactive: 2
    neighbourhood_limit_inline: 15
    neighbourhood_limit_proactive: 30
    max_seeds_inline: 5
    timeout_seconds_inline: 5
    model: "anthropic/claude-haiku-4-5"
  push:
    enabled: false              # off by default until Phase 58 inline is trusted
    schedule: "0 */4 * * *"
    max_seeds_per_run: 20
    seed_lookback_hours: 8      # look back slightly more than the cron interval
    dry_run: true               # log would-be pushes during calibration; set false to go live
    max_pushes_per_day: 3
  salience:
    dry_run: false             # true → log admission decisions without writing to graph
    admission:
      tau_admit: 0.55
      tau_watch: 0.35
      w_relevance: 0.7
      w_magnitude: 0.3
      watch_buffer_ttl_hours: 48
    surfacing:
      tau_push: 0.6            # interrupt bar (proactive push, Phase 59 — deferred)
      tau_inline: 0.45         # low bar (inline section, Phase 58 — v1); must be < tau_push
      tau_relevance: 0.5
      min_evidence: 2
      novelty_similarity_max: 0.85
    budget:
      max_pushes_per_day: 3
    feedback:
      step: 0.05
      tau_min: 0.4
      tau_max: 0.85
    relevance:
      episode_lookback_days: 30
      cache_ttl_minutes: 30

news:
  enabled: true
  fetch_schedule: "*/30 * * * *"
  min_fetch_interval_minutes: 30
  retention_days: 7
  model: "openai/gpt-4o-mini"
  briefing_limit: 8
  personalization:
    enabled: true
    explore_ratio: 0.2
    min_preferences: 2
    max_per_topic: 2
    candidate_multiplier: 4
    fact_days: 365
    fact_limit: 100
    min_confidence: 0.65
    briefing_limit: 8
    min_facts: 5
  credibility:
    enabled: true
    llm_scoring: true
    model: "openai/gpt-4o-mini"
    flag_in_briefing: true
    briefing_summary: true
  nli_credibility_enabled: false
  nli_headline_contradiction_threshold: 0.50
  nli_headline_entailment_threshold: 0.30
  nli_dedup_enabled: false
  nli_dedup_cosine_threshold: 0.75
  nli_dedup_entailment_threshold: 0.70
  sources:
    - key: bbc_world
      type: rss
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"
      tags: [global, general]
    - key: bbc_tech
      type: rss
      url: "https://feeds.bbci.co.uk/news/technology/rss.xml"
      tags: [global, tech]
    - key: hn
      type: rss
      url: "https://hnrss.org/frontpage"
      tags: [global, tech, hacker-news]
    - key: jornal_leiria
      type: rss
      url: "https://www.jornaldeleiria.pt/rss-feed"
      tags: [local, pt, leiria]
    - key: regiao_leiria
      type: rss
      url: "https://www.regiaodeleiria.pt/feed/"
      tags: [local, pt, leiria]
    - key: dn
      type: rss
      url: "https://www.dn.pt/feed/"
      tags: [local, pt, national]
    - key: observador
      type: rss
      url: "https://observador.pt/feed/"
      tags: [local, pt, national]

finance:
  snapshot_schedule: "0 8 * * *"
  large_transaction_threshold: 500
  llm_categorization: false
  nli_merchant_merge_enabled: false
  nli_merchant_cosine_threshold: 0.70
  nli_merchant_entailment_threshold: 0.70

dream:
  enabled: true
  cron: "0 3 * * *"
  max_replay_episodes: 100
  max_synthesis_per_run: 20
  max_stress_tests_per_goal: 2
  max_schema_candidates_per_run: 30
  session_archive_threshold_days: 7
  auto_promote_min_support: 3
  auto_promote_min_distinct_sessions: 2
  auto_promote_min_temporal_spread_days: 7
  auto_promote_max_user_asserted: 1
  nli_groundedness_threshold: 0.75
  novelty_similarity_threshold: 0.92
  decay_cycles: 5
  decay_rate: 0.1
  forgetting_weight_threshold: 0.1
  synthesis_model: "anthropic/claude-haiku-4-5"
  critic_model: "anthropic/claude-sonnet-4-6"
  synthetic_fact_valid_days: 90
  job_timeout_seconds: 1800