# Ze structural config — secrets and deployment values live in .env

models:
  router:         anthropic/claude-haiku-4-5
  synthesis:      anthropic/claude-haiku-4-5
  profile:        anthropic/claude-haiku-4-5
  reminders:      anthropic/claude-haiku-4-5
  insights:       anthropic/claude-haiku-4-5
  whisper:          openai/gpt-audio
  vision_caption:   google/gemini-flash-1.5
  workflow_verify:  anthropic/claude-haiku-4-5-20251001

memory:
  graph:
    enabled: true
    max_hops: 1
    max_relationships: 20

contacts:
  consolidation:
    episode_batch_size: 10
    max_episodes_per_run: 50
    nightly_cron: "0 3 * * *"
    review_cron: "30 8 * * *"
  follow_up:
    stale_days: 7
    max_nudges: 3

proactive:
  briefing:
    enabled: true
    cron: "0 8 * * *"
    unreviewed_nudge_threshold: 5
  alerts:
    workflow_failure_enabled: true
    workflow_failure_cooldown_hours: 1
  calendar:
    sync_enabled: true
    sync_cron: "45 7 * * *"
    sync_days_ahead: 7
  insights:
    enabled: true
    cron: "0 7 * * 0"
    lookback_days: 7
    min_evidence: 3
    max_per_run: 3
    category_cooldown_days: 7
  goal_narrative:
    enabled: true
    cron: "0 18 * * 0"
  goal_suggestion:
    enabled: true
    cron: "0 19 * * 0"
  stuck_goals:
    enabled: true
    cron: "0 9 * * 2"
  accountability:
    enabled: true
    schedule: "0 9 * * 1"          # Monday 09:00 weekly narrative
    cost_anomaly_schedule: "0 */6 * * *"  # every 6 hours
    anomaly_threshold: 4.0          # multiplier above baseline to alert
    anomaly_min_samples: 5          # min historical runs to establish baseline
    anomaly_retention_days: 30      # how long to keep anomaly records
    stall_days: 3                   # milestone idle days before counted as stalled

news:
  enabled: true
  fetch_schedule: "*/30 * * * *"
  retention_days: 7
  model: "openai/gpt-4o-mini"
  briefing_limit: 8
  personalization:
    enabled: true
    explore_ratio: 0.2
    candidate_multiplier: 3
    briefing_limit: 8
    min_facts: 5
  credibility:
    enabled: true
    llm_scoring: true
    model: "openai/gpt-4o-mini"
    flag_in_briefing: true
    briefing_summary: true
  sources:
    - key: bbc_world
      type: rss
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"
      tags: [global, general]
    - key: bbc_tech
      type: rss
      url: "https://feeds.bbci.co.uk/news/technology/rss.xml"
      tags: [global, tech]
    - key: hn
      type: rss
      url: "https://hnrss.org/frontpage"
      tags: [global, tech, hacker-news]
    - key: jornal_leiria
      type: rss
      url: "https://www.jornaldeleiria.pt/rss-feed"
      tags: [local, pt, leiria]
    - key: regiao_leiria
      type: rss
      url: "https://www.regiaodeleiria.pt/feed/"
      tags: [local, pt, leiria]
    - key: dn
      type: rss
      url: "https://www.dn.pt/feed/"
      tags: [local, pt, national]
    - key: observador
      type: rss
      url: "https://observador.pt/feed/"
      tags: [local, pt, national]