[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
version_locations = migrations/versions:../ze-core/ze_core/migrations/versions

# Sync URL used by Alembic CLI only.
# Set via DATABASE_URL_SYNC env var or override with --url flag.
# Format: postgresql+psycopg2://ze:ze@localhost:5432/ze
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
